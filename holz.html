<body>
  <div class="fh5co-loader"></div>

  <div id="page">
    <div id="menu-placeholder"></div>

    <div id="fh5co-author">
      <div class="container">
        <div class="row top-line">
          <div class="col-md-10 col-md-offset-1">
            <div class="material-intro">
              <h1 id="titel">Lädt …</h1>
              <p id="einleitung">Inhalte werden geladen …</p>
              <p id="status" class="gallery-status"></p>
            </div>

            <div id="gallery" class="gallery-grid"></div>

            <div class="row row-pt-md portfolio-navigation">
              <div class="col-xs-4 text-left">
                <a href="index.html" class="btn btn-primary btn-outline"><i class="icon-chevron-left"></i> Zurück</a>
              </div>
              <div class="col-xs-4 text-center">
                <a href="index.html" class="btn btn-primary btn-outline"><i class="icon-grid2"></i> Portfolio</a>
              </div>
              <div class="col-xs-4 text-right">
                <a href="contact.html" class="btn btn-primary btn-outline">Anfragen <i class="icon-chevron-right"></i></a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="fh5co-started">
      <div class="container">
        <div class="row animate-box">
          <div class="col-md-8 col-md-offset-2 text-center fh5co-heading">
            <h2>Individuell. Persönlich. Mit Herz.</h2>
            <p>Ob Gravuren auf Holz, Glas, Schiefer oder kleine Geschenkideen – wir freuen uns auf deine Anfrage.</p>
            <p><a href="contact.html" class="btn btn-primary">Kontaktiere uns</a></p>
          </div>
        </div>
      </div>
    </div>

    <div id="footer-placeholder"></div>
  </div>

  <div id="lightbox" class="lightbox">
    <div class="lightbox-inner">
      <button id="lightbox-close" class="lightbox-close" aria-label="Schließen">&times;</button>
      <img id="lightbox-image" src="" alt="">
      <div id="lightbox-caption" class="lightbox-caption"></div>
    </div>
  </div>

  <div class="gototop js-top">
    <a href="#" class="js-gotop"><i class="icon-arrow-up"></i></a>
  </div>

  <script src="js/jquery.min.js"></script>
  <script src="js/jquery.easing.1.3.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <script src="js/jquery.waypoints.min.js"></script>

  <script>
    (function () {
      var titelEl = document.getElementById("titel");
      var einleitungEl = document.getElementById("einleitung");
      var statusEl = document.getElementById("status");
      var galleryEl = document.getElementById("gallery");
      var lightboxEl = document.getElementById("lightbox");
      var lightboxImageEl = document.getElementById("lightbox-image");
      var lightboxCaptionEl = document.getElementById("lightbox-caption");
      var lightboxCloseEl = document.getElementById("lightbox-close");

      function openLightbox(src, altText, titleText) {
        lightboxImageEl.src = src;
        lightboxImageEl.alt = altText || titleText || "";
        lightboxCaptionEl.textContent = titleText || altText || "";
        lightboxEl.classList.add("active");
        document.body.style.overflow = "hidden";
      }

      function closeLightbox() {
        lightboxEl.classList.remove("active");
        lightboxImageEl.src = "";
        document.body.style.overflow = "";
      }

      if (lightboxCloseEl) {
        lightboxCloseEl.addEventListener("click", closeLightbox);
      }

      if (lightboxEl) {
        lightboxEl.addEventListener("click", function (e) {
          if (e.target === lightboxEl) {
            closeLightbox();
          }
        });
      }

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && lightboxEl.classList.contains("active")) {
          closeLightbox();
        }
      });

      Promise.all([
        fetch("menu.html").then(function (res) { return res.text(); }),
        fetch("footer.html").then(function (res) { return res.text(); }),
        fetch("content/holz.json?v=" + Date.now()).then(function (res) {
          if (!res.ok) {
            throw new Error("holz.json konnte nicht geladen werden: " + res.status);
          }
          return res.json();
        })
      ]).then(function (results) {
        var menuData = results[0];
        var footerData = results[1];
        var data = results[2];

        document.getElementById("menu-placeholder").innerHTML = menuData;
        document.getElementById("footer-placeholder").innerHTML = footerData;

        var currentPage = window.location.pathname.split("/").pop() || "index.html";
        var menuLinks = document.querySelectorAll("#menu-placeholder a[href]");

        menuLinks.forEach(function (link) {
          var linkPage = link.getAttribute("href");

          if (linkPage === currentPage) {
            var li = link.closest("li");
            if (li) li.classList.add("active");

            var dropdown = link.closest(".dropdown");
            if (dropdown) {
              var parentLi = dropdown.closest(".has-dropdown");
              if (parentLi) parentLi.classList.add("active");
            }
          }
        });

        titelEl.textContent = data.titel || "Holz";
        einleitungEl.innerHTML = data.einleitung || "";
        galleryEl.innerHTML = "";
        statusEl.textContent = "";

        if (!data.galerie || !data.galerie.length) {
          galleryEl.innerHTML = '<p class="gallery-empty">Noch keine Bilder vorhanden.</p>';
        } else {
          data.galerie.forEach(function (item) {
            var bildPfad = item.bild || "";

            if (bildPfad.indexOf("./") === 0) {
              bildPfad = bildPfad.substring(2);
            }

            var card = document.createElement("div");
            card.className = "gallery-card";

            var img = document.createElement("img");
            img.src = bildPfad;
            img.alt = item.alt || item.titel || "";

            var caption = document.createElement("div");
            caption.className = "gallery-caption";

            if (item.titel) {
              var h3 = document.createElement("h3");
              h3.textContent = item.titel;
              caption.appendChild(h3);
            }

            if (item.alt) {
              var p = document.createElement("p");
              p.textContent = item.alt;
              caption.appendChild(p);
            }

            card.appendChild(img);
            card.appendChild(caption);

            card.addEventListener("click", function () {
              openLightbox(bildPfad, item.alt || "", item.titel || "");
            });

            galleryEl.appendChild(card);
          });
        }

        var mainScript = document.createElement("script");
        mainScript.src = "js/main.js";
        document.body.appendChild(mainScript);
      }).catch(function (err) {
        console.error("Fehler:", err);

        if (titelEl) titelEl.textContent = "Fehler beim Laden";
        if (einleitungEl) einleitungEl.textContent = "Die Inhalte konnten gerade nicht geladen werden.";
        if (statusEl) statusEl.textContent = err.message;
        if (galleryEl) galleryEl.innerHTML = '<p class="gallery-error">Galerie konnte nicht geladen werden.</p>';
      });
    })();
  </script>
</body>
