<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holz – Herzmade</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #222;
    }

    .wrap {
      max-width: 1100px;
      margin: auto;
      padding: 24px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .intro {
      margin-bottom: 30px;
      max-width: 800px;
      line-height: 1.6;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
    }

    .card {
      background: #f5f5f5;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .card .text {
      padding: 10px 12px;
    }

    .card h3 {
      margin: 0 0 4px;
      font-size: 15px;
    }

    .card p {
      margin: 0;
      font-size: 13px;
      color: #666;
    }

    /* LIGHTBOX */

    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 85%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="wrap">
  <h1 id="titel">Lädt…</h1>
  <p id="einleitung" class="intro"></p>

  <div id="gallery" class="gallery"></div>
</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="">
</div>

<script>
async function loadContent() {
  try {
    const response = await fetch('/content/holz.json');
    const data = await response.json();

    document.getElementById('titel').textContent = data.titel || 'Holz';
    document.getElementById('einleitung').textContent = data.einleitung || '';

    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';

    (data.galerie || []).forEach(item => {

      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <img src="${item.bild}" alt="${item.alt || ''}">
        <div class="text">
          <h3>${item.titel || ''}</h3>
          <p>${item.alt || ''}</p>
        </div>
      `;

      // Klick = großes Bild
      card.onclick = () => openLightbox(item.bild);

      gallery.appendChild(card);
    });

  } catch (err) {
    console.error(err);
    document.getElementById('titel').textContent = 'Fehler beim Laden';
  }
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').style.display = 'flex';
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}

loadContent();
</script>

</body>
</html>
