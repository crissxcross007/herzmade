<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Holz Gravur in Döbern | Herzmade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="css/bootstrap.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    body { padding: 30px 0; }
    #testbild {
      max-width: 100%;
      height: auto;
      display: block;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="titel">Lädt …</h1>
    <p id="einleitung">Inhalte werden geladen …</p>

    <div id="status" style="margin:20px 0; color:#666;">Script startet …</div>

    <img id="testbild" src="" alt="">
  </div>

  <script>
    var titelEl = document.getElementById("titel");
    var einleitungEl = document.getElementById("einleitung");
    var statusEl = document.getElementById("status");
    var bildEl = document.getElementById("testbild");

    statusEl.textContent = "Lade JSON …";

    fetch("/content/holz.json?v=" + Date.now())
      .then(function (res) {
        if (!res.ok) {
          throw new Error("JSON nicht geladen: " + res.status);
        }
        return res.json();
      })
      .then(function (data) {
        titelEl.textContent = data.titel || "Holz";
        einleitungEl.textContent = data.einleitung || "";

        if (!data.galerie || !data.galerie.length) {
          statusEl.textContent = "JSON geladen, aber Galerie leer.";
          return;
        }

        var bildPfad = data.galerie[0].bild || "";

        if (bildPfad.indexOf("./") === 0) {
          bildPfad = "/" + bildPfad.substring(2);
        }

        bildEl.src = bildPfad;
        bildEl.alt = data.galerie[0].alt || data.galerie[0].titel || "";
        statusEl.textContent = "Bild geladen: " + bildPfad;
      })
      .catch(function (err) {
        statusEl.textContent = "Fehler: " + err.message;
      });
  </script>
</body>
</html>
