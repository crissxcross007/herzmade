  <style>
    .material-intro { margin-bottom: 50px; }
    .material-intro h1 { margin-bottom: 20px; }
    .material-intro p { font-size: 18px; line-height: 1.7; color: #555; }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 28px;
      margin-bottom: 50px;
    }

    .gallery-card {
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      transition: 0.2s;
      cursor: pointer;
    }

    .gallery-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.1);
    }

    .gallery-card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }

    .gallery-caption {
      padding: 16px 18px;
    }

    .gallery-caption h3 {
      margin: 0 0 6px;
      font-size: 18px;
      color: #222;
    }

    .gallery-caption p {
      margin: 0;
      color: #666;
    }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .lightbox.active { display: flex; }

    .lightbox img {
      max-width: 90%;
      max-height: 90%;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 30px;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>

<body>
<div class="fh5co-loader"></div>

<div id="page">
  <div id="menu-placeholder"></div>

  <div id="fh5co-author">
    <div class="container">
      <div class="material-intro">
        <h1 id="titel">Lädt …</h1>
        <p id="einleitung">Inhalte werden geladen …</p>
        <p id="status"></p>
      </div>

      <div id="gallery" class="gallery-grid"></div>
    </div>
  </div>

  <div id="footer-placeholder"></div>
</div>

<div id="lightbox" class="lightbox">
  <span id="lightbox-close" class="lightbox-close">&times;</span>
  <img id="lightbox-image">
</div>

<script src="js/jquery.min.js"></script>

<script>
(function () {

  const titelEl = document.getElementById("titel");
  const einleitungEl = document.getElementById("einleitung");
  const galleryEl = document.getElementById("gallery");

  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-image");
  const closeBtn = document.getElementById("lightbox-close");

  function openLightbox(src){
    lightboxImg.src = src;
    lightbox.classList.add("active");
  }

  closeBtn.onclick = () => lightbox.classList.remove("active");
  lightbox.onclick = e => { if(e.target === lightbox) lightbox.classList.remove("active"); };

  Promise.all([
    fetch("menu.html").then(r=>r.text()),
    fetch("footer.html").then(r=>r.text()),
    fetch("content/leder.json?v=" + Date.now()).then(r=>r.json())
  ])
  .then(([menu, footer, data]) => {

    document.getElementById("menu-placeholder").innerHTML = menu;
    document.getElementById("footer-placeholder").innerHTML = footer;

    titelEl.textContent = data.titel || "Leder";
    einleitungEl.innerHTML = data.einleitung || "";

    data.galerie.forEach(item => {
      const card = document.createElement("div");
      card.className = "gallery-card";

      const img = document.createElement("img");
      img.src = item.bild;
      img.onclick = () => openLightbox(item.bild);

      const caption = document.createElement("div");
      caption.className = "gallery-caption";
      caption.innerHTML = `<h3>${item.titel||""}</h3><p>${item.alt||""}</p>`;

      card.appendChild(img);
      card.appendChild(caption);
      galleryEl.appendChild(card);
    });

  });

})();
</script>

</body>
</html>
