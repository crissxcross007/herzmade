media:
  - name: holz
    label: Holzbilder
    input: images/holz
    output: /images/holz
    extensions: [jpg, jpeg, png, webp]

  - name: glas
    label: Glasbilder
    input: images/glas
    output: /images/glas
    extensions: [jpg, jpeg, png, webp]

  - name: schiefer
    label: Schieferbilder
    input: images/schiefer
    output: /images/schiefer
    extensions: [jpg, jpeg, png, webp]

  - name: zipper
    label: Zipperbilder
    input: images/zipper
    output: /images/zipper
    extensions: [jpg, jpeg, png, webp]

content:
  - name: holz
    label: Holz
    type: file
    path: content/holz.json
    format: json
    fields:
      - name: titel
        label: Titel
        type: string

      - name: slug
        label: Slug
        type: string

      - name: einleitung
        label: Einleitung
        type: text

      - name: galerie
        label: Galerie
        type: list
        fields:
          - name: bild
            label: Bild
            type: image
            media: holz

          - name: titel
            label: Bildtitel
            type: string

          - name: alt
            label: Alternativtext
            type: string

  - name: glas
    label: Glas
    type: file
    path: content/glas.json
    format: json
    fields:
      - name: titel
        label: Titel
