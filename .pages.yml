    output: /images/leder
    rename: safe
    extensions: [jpg, jpeg, png, webp]

  - name: keramik
    label: Keramikbilder
    input: /images/keramik
    output: /images/keramik
    rename: safe
    extensions: [jpg, jpeg, png, webp]


content:
  - name: holz
    label: Holz
    type: file
    path: content/holz.json
    format: json
    fields:
      - name: titel
        type: string
      - name: slug
        type: string
      - name: einleitung
        type: richtext
      - name: galerie
        label: Galerie
        type: object
        list: true
        fields:
          - name: bild
            label: Bild
            type: image
            media: holz
          - name: titel
            type: string
          - name: alt
