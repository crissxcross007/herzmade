      - name: titel
        label: Titel
        type: string
      - name: slug
        label: Slug
        type: string
      - name: einleitung
        label: Einleitung
        type: text
      - name: galerie
        label: Galerie
        type: list
        fields:
          - name: bild
            label: Bild
            type: image
            media: schiefer
          - name: titel
            label: Bildtitel
            type: string
          - name: alt
            label: Alternativtext
            type: string

  - name: zipper
    label: Zipper
    type: file
    path: content/zipper.json
    fields:
      - name: titel
        label: Titel
        type: string
      - name: slug
        label: Slug
        type: string
      - name: einleitung
        label: Einleitung
        type: text
      - name: galerie
        label: Galerie
        type: list
        fields:
          - name: bild
            label: Bild
            type: image
            media: zipper
          - name: titel
            label: Bildtitel
            type: string
          - name: alt
            label: Alternativtext
            type: string

