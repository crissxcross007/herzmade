media:
  - name: holz
    label: Holzbilder
    input: images/holz
    output: /images/holz
    rename: safe
    extensions: [jpg, jpeg, png, webp]

  - name: glas
    label: Glasbilder
    input: images/glas
    output: /images/glas
    rename: safe
    extensions: [jpg, jpeg, png, webp]

  - name: schiefer
    label: Schieferbilder
    input: images/schiefer
    output: /images/schiefer
    rename: safe
    extensions: [jpg, jpeg, png, webp]

  - name: zipper
    label: Zipperbilder
    input: images/zipper
