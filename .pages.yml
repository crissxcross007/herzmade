media:
  input: images
  output: /images

content:
  - name: materialseiten
    label: Materialseiten
    type: collection
    path: content
    filename: "{fields.slug}.json"
    fields:
      - name: titel
        label: Titel
        type: string
      - name: slug
        label: Slug
        type: string
      - name: einleitung
        label: Einleitung
        type: text
      - name: galerie
        label: Galerie
        type: list
        fields:
          - name: bild
            label: Bild
            type: image
          - name: titel
            label: Bildtitel
            type: string
          - name: alt
            label: Alternativtext
            type: string
