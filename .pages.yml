media:
  - name: holz
    label: Holzbilder
    input: images/holz
    output: /images/holz

  - name: glas
    label: Glasbilder
    input: images/glas
    output: /images/glas

  - name: schiefer
    label: Schieferbilder
    input: images/schiefer
    output: /images/schiefer

  - name: zipper
    label: Zipperbilder
    input: images/zipper
    output: /images/zipper

- name: edelstahl
  label: Edelstahlbilder
  input: images/edelstahl
  output: /images/edelstahl

content:
  - name: holz
    label: Holz
    type: file
    path: content/holz.json
    format: json
    fields:
      - name: titel
        label: Titel
        type: string

      - name: slug
        label: Slug
        type: string

      - name: einleitung
        label: Einleitung
        type: text

      - name: galerie
        label: Galerie
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{titel}"
        fields:
          - name: bild
            label: Bild
            type: image
            media: holz

          - name: titel
            label: Bildtitel
            type: string

          - name: alt
            label: Alternativtext
            type: string

  - name: glas
    label: Glas
    type: file
    path: content/glas.json
    format: json
    fields:
      - name: titel
        label: Titel
        type: string

      - name: slug
        label: Slug
        type: string

      - name: einleitung
        label: Einleitung
        type: text

      - name: galerie
        label: Galerie
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{titel}"
        fields:
          - name: bild
            label: Bild
            type: image
            media: glas

          - name: titel
            label: Bildtitel
            type: string

          - name: alt
            label: Alternativtext
            type: string

  - name: schiefer
    label: Schiefer
    type: file
    path: content/schiefer.json
    format: json
    fields:
      - name: titel
        label: Titel
        type: string

      - name: slug
        label: Slug
        type: string

      - name: einleitung
        label: Einleitung
        type: text

      - name: galerie
        label: Galerie
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{titel}"
        fields:
          - name: bild
            label: Bild
            type: image
            media: schiefer

          - name: titel
            label: Bildtitel
            type: string

          - name: alt
            label: Alternativtext
            type: string

  - name: zipper
    label: Zipper
    type: file
    path: content/zipper.json
    format: json
    fields:
      - name: titel
        label: Titel
        type: string

      - name: slug
        label: Slug
        type: string

      - name: einleitung
        label: Einleitung
        type: text

      - name: galerie
        label: Galerie
        type: object
        list:
          collapsible:
            collapsed: true
            summary: "{titel}"
        fields:
          - name: bild
            label: Bild
            type: image
            media: zipper

          - name: titel
            label: Bildtitel
            type: string

          - name: alt
            label: Alternativtext
            type: string

- name: edelstahl
  label: Edelstahl
  type: file
  path: content/edelstahl.json
  format: json
  fields:
    - name: titel
      label: Titel
      type: string

    - name: slug
      label: Slug
      type: string

    - name: einleitung
      label: Einleitung
      type: text

    - name: galerie
      label: Galerie
      type: object
      list:
        collapsible:
          collapsed: true
          summary: "{titel}"
      fields:
        - name: bild
          label: Bild
          type: image
          media: edelstahl

        - name: titel
          label: Bildtitel
          type: string

        - name: alt
          label: Alternativtext
          type: string
  
  settings:
  content:
    merge: true
